<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Datos de Transferencia</title>

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #f5efe6, #e8dfd4);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        background: #ffffff;
        padding: 40px 30px;
        border-radius: 20px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.08);
        text-align: center;
        width: 90%;
        max-width: 400px;
        animation: fadeIn 0.8s ease forwards;
        opacity: 0;
        transform: translateY(15px);
    }

    @keyframes fadeIn {
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    h1 {
        color: #5b4433;
        font-size: 22px;
        margin-bottom: 30px;
        letter-spacing: 1px;
    }

    .account-number {
        font-size: 20px;
        font-weight: bold;
        letter-spacing: 2px;
        margin: 20px 0;
        color: #4e392a;
    }

    .details p {
        font-size: 16px;
        margin: 8px 0;
        font-weight: bold;
        color: #5b4433;
    }

    .copy-btn, .whatsapp-btn {
        padding: 14px;
        border-radius: 10px;
        font-size: 15px;
        font-weight: bold;
        width: 100%;
        margin-bottom: 15px;
        cursor: pointer;
        transition: all 0.3s ease;
        border: none;
        text-decoration: none;
        display: inline-block;
    }

    .copy-btn {
        background-color: #5b4433;
        color: white;
        white-space: pre-line; /* permite saltos de línea */
    }

    .copy-btn:hover {
        background-color: #3f2f23;
        transform: translateY(-2px);
        box-shadow: 0 6px 14px rgba(0,0,0,0.15);
    }

    .whatsapp-btn {
        background-color: #8a6a52;
        color: white;
    }

    .whatsapp-btn:hover {
        background-color: #6b4f3b;
        transform: translateY(-2px);
        box-shadow: 0 6px 14px rgba(0,0,0,0.15);
    }

    .footer {
        margin-top: 25px;
        font-size: 11px;
        color: #9c948a;
    }
</style>
</head>

<body>

<div class="container">

    <h1>Datos de Transferencia</h1>

    <div class="account-number" id="accountNumber">
        646990404066035891
    </div>

    <button class="copy-btn" onclick="copyNumber()" id="copyButton">
        Copiar número
    </button>

    <div class="details">
        <p>Banco: Revolut</p>
        <p>Titular: Patricio Gzz</p>
    </div>

    <a class="whatsapp-btn" 
       href="https://wa.me/5218182589140?text=Hola,%20ya%20realic%C3%A9%20mi%20transferencia.%20Adjunto%20mi%20comprobante."
       target="_blank">
       Captura y Envía Comprobante
    </a>

    <div class="footer">
        © 2026 KFeta® Servicios Especializados.  
        Todos los derechos reservados.
    </div>
</div>

<script>
function copyNumber() {
    const number = document.getElementById("accountNumber").innerText;
    navigator.clipboard.writeText(number).then(() => {
        const button = document.getElementById("copyButton");
        button.innerText = "Copiado\nPegue en su app bancaria"; // salto de línea
        button.style.backgroundColor = "#8a6a52";
    });
}
</script>

</body>
</html>
