<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Datos de Transferencia</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #fdf7f0, #f2e8dd);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
}

.container {
    background: #ffffff;
    padding: 35px 25px;
    border-radius: 25px;
    text-align: center;
    width: 100%;
    max-width: 400px;
    position: relative;
    border: 2px solid transparent;
    background-clip: padding-box;
    box-shadow: 0 25px 50px rgba(0,0,0,0.12);
    animation: fadeIn 0.8s ease forwards;
    opacity: 0;
    transform: translateY(15px);
}

.container::before {
    content: '';
    position: absolute;
    top: -2px; left: -2px; right: -2px; bottom: -2px;
    border-radius: 27px;
    background: linear-gradient(145deg, #e0d6c5, #cbbfa8);
    z-index: -1;
}

@keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }

h1 {
    color: #3e2f23;
    font-size: 22px;
    margin-bottom: 25px;
    letter-spacing: 1px;
}

.account-number {
    font-size: 20px;
    font-weight: bold;
    letter-spacing: 2px;
    margin: 18px 0;
    color: #2e1f15;
    word-break: break-all;
}

.details p {
    font-size: 15px;
    margin: 6px 0;
    font-weight: bold;
    color: #3e2f23;
}

/* Botones auto-ancho, estilo “tarjeta flotante” */
button.copy-btn, a.whatsapp-btn {
    display: inline-block;
    padding: 10px 20px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: bold;
    margin-bottom: 12px;
    cursor: pointer;
    border: none;
    text-decoration: none;
    text-align: center;
    white-space: pre-line;
    transition: all 0.3s ease;
    box-shadow: 0 4px 6px rgba(0,0,0,0.15);
}

/* Copiar número */
button.copy-btn {
    background-color: #3e2f23;
    color: #ffffff;
    border: 1px solid rgba(0,0,0,0.1);
}
button.copy-btn:hover {
    background-color: #5a4433;
    transform: translateY(-2px);
    box-shadow: 0 8px 12px rgba(0,0,0,0.2);
}

/* WhatsApp */
a.whatsapp-btn {
    background-color: #25D366;
    color: #ffffff;
    border: 1px solid rgba(0,0,0,0.1);
}
a.whatsapp-btn:hover {
    background-color: #1ebe57;
    transform: translateY(-2px);
    box-shadow: 0 8px 12px rgba(0,0,0,0.2);
}

.footer {
    margin-top: 20px;
    font-size: 11px;
    color: #9c948a;
}

@media (max-width: 480px) {
    h1 { font-size: 20px; }
    .account-number { font-size: 18px; }
    .details p { font-size: 14px; }
    button.copy-btn, a.whatsapp-btn { font-size: 14px; padding: 8px 16px; }
}
</style>
</head>

<body>
<div class="container">
    <h1>Datos de Transferencia</h1>

    <div class="account-number" id="accountNumber">
        646990404066035891
    </div>

    <button class="copy-btn" onclick="copyNumber()" id="copyButton">
        Copiar número
    </button>

    <div class="details">
        <p>Banco: Revolut</p>
        <p>Titular: Patricio Gzz</p>
    </div>

    <a class="whatsapp-btn" 
       href="https://wa.me/5218182589140?text=Hola,%20ya%20realic%C3%A9%20mi%20transferencia.%20Adjunto%20mi%20comprobante."
       target="_blank">
       Captura y Envía Comprobante
    </a>

    <div class="footer">
        © 2026 KFeta® Servicios Especializados.  
        Todos los derechos reservados.
    </div>
</div>

<script>
function copyNumber() {
    const number = document.getElementById("accountNumber").innerText;
    const button = document.getElementById("copyButton");
    navigator.clipboard.writeText(number).then(() => {
        // Cambiar texto y color con palomita
        button.innerHTML = "✅ Copiado\nPegue en su app bancaria";
        button.style.backgroundColor = "#2e7d32";
        // Volver a estado original después de 3 segundos
        setTimeout(() => {
            button.innerHTML = "Copiar número";
            button.style.backgroundColor = "#3e2f23";
        }, 3000);
    });
}
</script>

</body>
</html>
