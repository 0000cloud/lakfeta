<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Datos de Transferencia</title>

<style>
    /* Reset básico */
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #f5efe6, #e8dfd4, #e0d5c5);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
    }

    .container {
        background: #fff8f0;
        padding: 35px 25px;
        border-radius: 25px;
        text-align: center;
        width: 100%;
        max-width: 400px;
        position: relative;
        border: 2px solid transparent;
        background-clip: padding-box;
        animation: fadeIn 0.8s ease forwards;
        opacity: 0;
        transform: translateY(15px);
        box-shadow: 0 25px 50px rgba(0,0,0,0.15);
    }

    .container::before {
        content: '';
        position: absolute;
        top: -2px; left: -2px; right: -2px; bottom: -2px;
        border-radius: 27px;
        background: linear-gradient(145deg, #d8c1ac, #bfa081);
        z-index: -1;
    }

    @keyframes fadeIn {
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    h1 {
        color: #5b4433;
        font-size: 22px;
        margin-bottom: 25px;
        letter-spacing: 1px;
    }

    .account-number {
        font-size: 20px;
        font-weight: bold;
        letter-spacing: 2px;
        margin: 18px 0;
        color: #4e392a;
        word-break: break-all;
    }

    .details p {
        font-size: 15px;
        margin: 6px 0;
        font-weight: bold;
        color: #5b4433;
    }

    .copy-btn, .whatsapp-btn {
        padding: 13px;
        border-radius: 12px;
        font-size: 15px;
        font-weight: bold;
        width: 100%;
        margin-bottom: 12px;
        cursor: pointer;
        transition: all 0.3s ease;
        border: none;
        text-decoration: none;
        display: block;
        text-align: center;
        box-shadow: inset 0 2px 4px rgba(255,255,255,0.4);
    }

    .copy-btn {
        background: linear-gradient(145deg, #5b4433, #7b5c43);
        color: white;
        white-space: pre-line;
    }

    .copy-btn:hover {
        background: linear-gradient(145deg, #3f2f23, #5b4433);
        transform: translateY(-2px);
        box-shadow: inset 0 2px 6px rgba(255,255,255,0.5), 0 6px 14px rgba(0,0,0,0.15);
    }

    .whatsapp-btn {
        background: linear-gradient(145deg, #8a6a52, #a68269);
        color: white;
    }

    .whatsapp-btn:hover {
        background: linear-gradient(145deg, #6b4f3b, #8a6a52);
        transform: translateY(-2px);
        box-shadow: inset 0 2px 6px rgba(255,255,255,0.5), 0 6px 14px rgba(0,0,0,0.15);
    }

    .footer {
        margin-top: 20px;
        font-size: 11px;
        color: #9c948a;
    }

    /* Responsive */
    @media (max-width: 480px) {
        .container {
            padding: 25px 20px;
        }
        h1 {
            font-size: 20px;
        }
        .account-number {
            font-size: 18px;
        }
        .details p {
            font-size: 14px;
        }
        .copy-btn, .whatsapp-btn {
            font-size: 14px;
            padding: 12px;
        }
    }
</style>
</head>

<body>

<div class="container">

    <h1>Datos de Transferencia</h1>

    <div class="account-number" id="accountNumber">
        646990404066035891
    </div>

    <button class="copy-btn" onclick="copyNumber()" id="copyButton">
        Copiar número
    </button>

    <div class="details">
        <p>Banco: Revolut</p>
        <p>Titular: Patricio Gzz</p>
    </div>

    <a class="whatsapp-btn" 
       href="https://wa.me/5218182589140?text=Hola,%20ya%20realic%C3%A9%20mi%20transferencia.%20Adjunto%20mi%20comprobante."
       target="_blank">
       Captura y Envía Comprobante
    </a>

    <div class="footer">
        © 2026 KFeta® Servicios Especializados.  
        Todos los derechos reservados.
    </div>
</div>

<script>
function copyNumber() {
    const number = document.getElementById("accountNumber").innerText;
    navigator.clipboard.writeText(number).then(() => {
        const button = document.getElementById("copyButton");
        button.innerText = "Copiado\nPegue en su app bancaria";
        button.style.background = "linear-gradient(145deg, #8a6a52, #a68269)";
    });
}
</script>

</body>
</html>
